<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevCortex | Agentic Development Control Centre</title>
    <style>
        :root {
            --dark-blue: #0f172a;
            --text-gray: #64748b;
            --accent-blue: #3b82f6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: var(--dark-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
            animation: fadeIn 1.2s ease-out;
        }

        .logo {
            max-width: 280px;
            height: auto;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-gray);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .status-badge {
            display: inline-block;
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="DCLogo1.png" alt="DevCortex Logo" class="logo">

        <h1>Coming Soon</h1>

        <div style="margin-top: 30px;">
            <small>Stay tuned for updates at <strong>www.devcortexai.com</strong></small>
        </div>
    </div>

    <footer>
        &copy; 2026 DevCortex. All rights reserved.
    </footer>

</body>
</html>
